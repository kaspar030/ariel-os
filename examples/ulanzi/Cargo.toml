[package]
name = "ulanzi"
version = "0.1.0"
license.workspace = true
edition.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
ariel-os = { path = "../../src/ariel-os", features = ["time", "random"] }
ariel-os-boards = { path = "../../src/ariel-os-boards" }
embassy-time = { workspace = true }
embassy-sync = { workspace = true }
smart-leds = "0.4.0"
